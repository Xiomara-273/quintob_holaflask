# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: flask app hola  
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "devops"]

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    -name: Construir la imagen
    run: doker build -t ghcr.io/xiomara-273/holaflask:1.0.0.

    -name: login hacia Github Container Registry
    run: echo "${{  secrets. TOKEN_WR }}" | doker login ghcr.io -u ${{ github.actor }} --password-stdin

    name: Publicar la imagen 
    run: doker push ghcr.io/Xiomara-273/holaflask:1.0.0
